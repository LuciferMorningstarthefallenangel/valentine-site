<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center,#1a001f,#000);
    font-family:Segoe UI, sans-serif;
    overflow:hidden;
    color:white;
    text-align:center;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    z-index:100;
    cursor:pointer;
}

/* CONTENT */
#container{
    position:relative;
    width:100%;
    max-width:500px;
}

h1{
    font-size:clamp(2rem,6vw,3rem);
    margin-bottom:80px;
    text-shadow:0 0 20px rgba(255,100,150,0.8);
}

.buttonArea{
    position:relative;
    height:220px;
    width:100%;
}

button{
    padding:14px 28px;
    font-size:1.1rem;
    border:none;
    border-radius:30px;
    cursor:pointer;
    position:absolute;
    transition:left .18s linear, top .18s linear;
}

#yesBtn{
    background:linear-gradient(45deg,#ff4d6d,#ff758c);
    left:30%;
    top:40%;
}

#noBtn{
    background:rgba(255,255,255,0.25);
    left:60%;
    top:40%;
}

#message{
    display:none;
    font-size:clamp(2rem,7vw,3.5rem);
    animation:fadeIn 1.5s ease forwards;
    text-shadow:0 0 25px rgba(255,100,150,1);
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(.8);}
    to{opacity:1; transform:scale(1);}
}

.heart{
    position:absolute;
    font-size:22px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div id="startScreen">Tap anywhere to start 💖</div>

<audio id="bgMusic" loop preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f2b7f6c6.mp3?filename=romantic-ambient-110397.mp3" type="audio/mp3">
</audio>

<div id="container">
    <h1 id="question">Do you love me? 💖</h1>

    <div class="buttonArea" id="area">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div id="message">❤️ Happy Valentine’s Day ❤️</div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const music = document.getElementById("bgMusic");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("area");
const message = document.getElementById("message");
const question = document.getElementById("question");

/* MUSIC START */
startScreen.addEventListener("click", async ()=>{
    startScreen.style.display="none";
    try{
        await music.play();
    }catch{}
});

/* ESCAPE INSIDE CENTER AREA */
function runAway(){
    const areaRect = area.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = areaRect.width - btnRect.width;
    const maxY = areaRect.height - btnRect.height;

    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
}

/* TRIGGER BEFORE CLICK */
noBtn.addEventListener("mouseenter", runAway);
noBtn.addEventListener("touchstart", runAway);
noBtn.addEventListener("mousedown", runAway);
noBtn.addEventListener("mousemove", runAway);

/* YES CLICK */
yesBtn.addEventListener("click", ()=>{
    question.style.display="none";
    area.style.display="none";
    message.style.display="block";

    setInterval(()=>{
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*window.innerWidth+"px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),6000);
    },250);
});
</script>

</body>
</html>
