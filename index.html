<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #ff758c, #ff7eb3);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* floating hearts */
.heart {
  position: absolute;
  bottom: -50px;
  font-size: 20px;
  animation: floatUp linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  from {
    transform: translateY(0) scale(0.5);
    opacity: 0.8;
  }
  to {
    transform: translateY(-120vh) scale(1.5);
    opacity: 0;
  }
}

/* cinematic glow */
.container {
  position: relative;
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 60px rgba(255,255,255,0.4);
  animation: fadeIn 2s ease;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 70px;
}

.buttons {
  position: relative;
  height: 200px;
}

button {
  padding: 14px 28px;
  font-size: 1.2rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
}

#yesBtn:hover {
  transform: scale(1.1);
}

#noBtn {
  position: absolute;
  left: 60%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: #444;
  color: white;
}

#message {
  display: none;
  font-size: 3rem;
  animation: zoomIn 2s ease forwards;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes zoomIn {
  from {opacity:0; transform: scale(0.5);}
  to {opacity:1; transform: scale(1);}
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">Do you love me? ❤️</h1>

  <div class="buttons">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 😢</button>
  </div>

  <div id="message">Happy Valentine's Day 💘</div>
</div>

<audio id="bgMusic" loop>
  <source src="romantic.mp3" type="audio/mpeg">
</audio>

<script>
/* Floating hearts generator */
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (3 + Math.random()*5) + "s";
  heart.style.fontSize = (15 + Math.random()*30) + "px";
  document.body.appendChild(heart);

  setTimeout(()=> heart.remove(), 8000);
}
setInterval(createHeart, 300);

/* NO button runaway logic */
const noBtn = document.getElementById("noBtn");

function moveButton(){
  const container = document.querySelector(".buttons");
  const rect = container.getBoundingClientRect();

  const x = Math.random() * (rect.width - noBtn.offsetWidth);
  const y = Math.random() * (rect.height - noBtn.offsetHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

["mouseover","mousemove","touchstart","touchmove"].forEach(evt=>{
  noBtn.addEventListener(evt, moveButton);
});

noBtn.addEventListener("click", e=>{
  e.preventDefault();
  moveButton();
});

/* YES click */
document.getElementById("yesBtn").addEventListener("click", ()=>{
  document.getElementById("question").style.display="none";
  document.querySelector(".buttons").style.display="none";
  document.getElementById("message").style.display="block";
});

/* music autoplay after first tap */
const music = document.getElementById("bgMusic");
document.body.addEventListener("click", ()=>{
  music.play().catch(()=>{});
},{ once:true });
</script>

</body>
</html>
